name: Публикация документации

on:
  push:
    paths:
      - 'docs/**'
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  deploy-docs:
    uses: autumn-library/workflows/.github/workflows/deploy-docs.yml@main
    with:
      github_repository: yellow-hammer/prometheus
    secrets:
      TRIGGER_DOCS_DEPLOY_TOKEN: ${{ secrets.TRIGGER_DOCS_DEPLOY_TOKEN }}

